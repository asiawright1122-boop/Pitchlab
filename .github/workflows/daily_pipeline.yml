name: PitchLab Daily Pipeline

on:
  schedule:
    # Run every day at 04:00 UTC (Early morning Europe time to process previous day's results)
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Engine Dependencies
        working-directory: ./engine
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Daily Pipeline
        working-directory: ./engine
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          # Ensure you have a script for daily sync or directly invoke the pitchlab CLI.
          # Here we run the shadow models comparison and other daily cron jobs.
          python -c "from pitchlab.agent.pipeline import PIPELINES; PIPELINES['daily']().run(None)"

      - name: Run Web Sync (If necessary)
        working-directory: ./apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          npm install
          npm run db:sync || echo "Sync finished or skipped"
          npm run sync:correct-scores || echo "Correct scores sync skipped/failed"
